name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "cpp-sidecar/**"
      - "python-worker/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "cpp-sidecar/**"
      - "python-worker/**"

env:
  REGISTRY: ghcr.io
  # Automatically derives the image owner from the GitHub actor
  IMAGE_CPP:    ghcr.io/${{ github.repository_owner }}/cpp-sidecar
  IMAGE_PYTHON: ghcr.io/${{ github.repository_owner }}/python-worker

jobs:

  # ── Build + push C++ sidecar ────────────────────────────────────────────────
  build-cpp-sidecar:
    name: Build C++ Sidecar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CPP }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push C++ sidecar
        uses: docker/build-push-action@v5
        with:
          context: ./cpp-sidecar
          file:    ./cpp-sidecar/Dockerfile
          push:    ${{ github.event_name != 'pull_request' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Build + push Python worker ──────────────────────────────────────────────
  build-python-worker:
    name: Build Python Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PYTHON }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Python worker
        uses: docker/build-push-action@v5
        with:
          context: ./python-worker
          file:    ./python-worker/Dockerfile
          push:    ${{ github.event_name != 'pull_request' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Validate Kubernetes manifests (no cluster needed) ───────────────────────
  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate manifests
        run: |
          kubeconform -strict -summary \
            k8s/configmap.yaml \
            k8s/deployment.yaml \
            k8s/service.yaml \
            k8s/monitoring/prometheus.yaml \
            k8s/monitoring/grafana.yaml

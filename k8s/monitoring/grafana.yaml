---
# Grafana datasource config — auto-wires Prometheus as the default datasource.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

---
# Grafana dashboard provisioning config.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
# Inference Engine dashboard definition.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-inference
  labels:
    app: grafana
data:
  inference-engine.json: |
    {
      "title": "Inference Engine",
      "uid":   "inference-engine",
      "panels": [
        {
          "id": 1,
          "title": "Requests per Second",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "rate(http_requests_total[1m])", "legendFormat": "req/s"}]
        },
        {
          "id": 2,
          "title": "Queue Depth",
          "type": "stat",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "queue_depth", "legendFormat": "waiting"}]
        },
        {
          "id": 3,
          "title": "Inference Latency (p50 / p95)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(inference_latency_ms_bucket[2m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(inference_latency_ms_bucket[2m]))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 4,
          "title": "Queue Wait Time (p50 / p95)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(queue_wait_ms_bucket[2m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(queue_wait_ms_bucket[2m]))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 5,
          "title": "Total Requests",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 12, "w": 24, "h": 6},
          "targets": [{"expr": "http_requests_total", "legendFormat": "total"}]
        }
      ],
      "time":     {"from": "now-15m", "to": "now"},
      "refresh":  "5s",
      "schemaVersion": 38
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"

      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboards
          configMap:
            name: grafana-dashboard-inference

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000

apiVersion: v1
kind: Service
metadata:
  name: inference-engine
  labels:
    app: inference-engine
spec:
  # NodePort exposes the service on a static port on every node.
  # Use `minikube service inference-engine` to get the URL.
  type: NodePort
  selector:
    app: inference-engine
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
      # nodePort is auto-assigned (30000-32767). Pin it if desired:
      # nodePort: 30080
